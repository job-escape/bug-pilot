name: Feature Memory

on:
  pull_request:
    types: [closed]

jobs:
  generate-manifest:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk @octokit/rest

      - name: Generate feature manifest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node .github/scripts/generate-manifest.mjs

      - name: Commit manifest
        run: |
          git config user.name "bug-pilot[bot]"
          git config user.email "bug-pilot@users.noreply.github.com"
          git add .feature-memory/
          git diff --cached --quiet || git commit -m "chore: feature memory for PR #${{ github.event.pull_request.number }} [skip ci]"
          git push
